name: Release Build

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows portable app
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build portable exe
        run: npm run make:exe

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/Desktop Buddy-win32-x64/Desktop Buddy.exe
          generate_release_notes: true
          prerelease: false
          body: |
            ## 📥 Installation
            
            1. Download `Desktop Buddy.exe` from the assets below
            2. Extract and run the `.exe` file
            3. Grant notification permissions when prompted
            
            ## 📋 What's Included
            - Windows portable executable (no installation required)
            - All features from this release
            - Use the included Settings to customize your experience
            
            ## 🐛 Found a Bug?
            [Report it here](https://github.com/twilighty-abhi/desktop-buddy/issues/new?template=bug_report.yml)
            
            ## 📖 Documentation
            - [Architecture Guide](https://github.com/twilighty-abhi/desktop-buddy/blob/main/ARCHITECTURE.md)
            - [Contributing Guide](https://github.com/twilighty-abhi/desktop-buddy/blob/main/CONTRIBUTING.md)
            - [Roadmap](https://github.com/twilighty-abhi/desktop-buddy/blob/main/ROADMAP.md)
